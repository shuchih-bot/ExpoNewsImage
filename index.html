<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSRICH Expo Photo System</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a1a1a; margin-top: 0; }
        #loadingMsg { color: #f39c12; font-weight: bold; margin-bottom: 15px; }
        video, canvas { width: 100%; max-width: 450px; border-radius: 8px; margin-bottom: 15px; background-color: #000; }
        canvas { display: none; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; padding: 14px 20px; font-size: 18px; border-radius: 6px; cursor: pointer; width: 90%; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #resultArea { display: none; margin-top: 20px; border-top: 2px dashed #eee; padding-top: 20px; }
        .success-box { background-color: #e3fdfd; padding: 15px; border-radius: 8px; border: 1px solid #cbf1f5; margin-bottom: 15px; }
        .qr-box { margin-top: 15px; background: #fafafa; padding: 15px; border-radius: 8px; }
        .qr-box img { width: 150px; height: 150px; }
        .qr-box p { font-size: 14px; color: #333; margin-top: 10px; font-family: monospace; }
        .hint { font-size: 12px; color: #999; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="boothTitle">Loading System...</h2>
    <div id="loadingMsg">Connecting to POSRICH Cloud Server...</div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    
    <div id="inputArea" style="display:none;">
        <input type="text" id="userName" placeholder="Full Name (Max 20 chars)" maxlength="20">
        <input type="email" id="userEmail" placeholder="Email Address (For redemption)">
        <button id="captureBtn">Generate Digital Photo</button>
    </div>

    <div id="resultArea">
        <div class="success-box">
            <h3 style="color: #27ae60; margin: 0 0 10px 0;">Success! Photo Generated</h3>
            <p id="successMsg" style="margin: 0; font-size: 15px; line-height: 1.4;"></p>
        </div>
        <div class="qr-box">
            <img id="qrImage" src="" alt="Redemption QR">
            <p id="qrEmailText"></p>
        </div>
        <p class="hint">Present this at the service desk.</p>
        
        <button id="shareBtn" style="background-color: #28a745; margin-top: 15px;">📤 Share / Save Photo</button>
    </div>
</div>

<script>
    // 您的專屬中央大腦 API 網址
    const GAS_BACKEND_URL = "https://script.google.com/macros/s/AKfycbz027yKpTWY-HGKlRS1ScGd2zOH_efBUENCLsPGsA6PABsV_h73ArVMRWJQ_pG8kPI_/exec";
    
    const urlParams = new URLSearchParams(window.location.search);
    const boothId = urlParams.get('booth') || 'A';
    
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('captureBtn');
    const shareBtn = document.getElementById('shareBtn');
    const loadingMsg = document.getElementById('loadingMsg');
    const inputArea = document.getElementById('inputArea');
    const boothTitle = document.getElementById('boothTitle');
    
    let bgImage = new Image();
    bgImage.crossOrigin = "anonymous";
    
    let currentBoothData = null;
    let threshold = 3; 

    // 1. Get Camera Stream
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { 
            loadingMsg.innerText = "Error: Camera access denied. Please check permissions.";
            loadingMsg.style.color = "red";
        });

    // 2. Fetch Settings from GAS
    fetch(`${GAS_BACKEND_URL}?action=get_settings`)
        .then(res => res.json())
        .then(data => {
            if (data.status === "success") {
                threshold = data.threshold;
                currentBoothData = data.booths.find(b => b.id === boothId);
                if (currentBoothData) {
                    boothTitle.innerText = `${currentBoothData.name}`;
                    bgImage.src = currentBoothData.bgUrl;
                    bgImage.onload = () => {
                        loadingMsg.style.display = "none";
                        inputArea.style.display = "block";
                    };
                } else {
                    loadingMsg.innerText = `Error: Booth [${boothId}] not found in settings.`;
                    loadingMsg.style.color = "red";
                }
            } else {
                throw new Error(data.message);
            }
        })
        .catch(err => {
            loadingMsg.innerText = "Error connecting to POSRICH server.";
            console.error(err);
        });

    // 3. Render, Crop and Capture Logic
    captureBtn.addEventListener('click', () => {
        const name = document.getElementById('userName').value.trim();
        let email = document.getElementById('userEmail').value.trim();
        
        if (!name || !email || !currentBoothData) {
            alert("Please provide both Name and Email.");
            return;
        }

        email = email.toLowerCase(); // Force lowercase for uniqueness
        
        captureBtn.disabled = true;
        captureBtn.innerText = "Processing...";

        // Parse dynamic settings from main Google Sheet
        const [pX, pY] = currentBoothData.photoPos.split(',').map(Number); 
        const [pW, pH] = currentBoothData.photoSize.split('*').map(Number); 
        const [nX, nY] = currentBoothData.namePos.split(',').map(Number); 
        const fSize = currentBoothData.fontSize; 

        // Set canvas to match backdrop image size
        canvas.width = bgImage.width;
        canvas.height = bgImage.height;
        const ctx = canvas.getContext('2d');
        
        // Draw backdrop
        ctx.drawImage(bgImage, 0, 0);
        
        // --- CENTERED CROP LOGIC ---
        const dAR = pW / pH; // Target ratio from sheet
        const sAR = video.videoWidth / video.videoHeight; // Camera ratio
        let sx, sy, sWidth, sHeight;

        if (dAR > sAR) {
            sWidth = video.videoWidth;
            sHeight = video.videoWidth / dAR;
            sx = 0;
            sy = (video.videoHeight - sHeight) / 2; 
        } else {
            sHeight = video.videoHeight;
            sWidth = video.videoHeight * dAR;
            sx = (video.videoWidth - sWidth) / 2; 
            sy = 0;
        }

        // Advanced centered cropping
        ctx.drawImage(video, sx, sy, sWidth, sHeight, pX, pY, pW, pH);
        
        // --- Draw Name ---
        ctx.fillStyle = "black"; 
        ctx.font = `bold ${fSize}px Arial`;
        ctx.fillText(name, nX, nY);
        
        const photoData = canvas.toDataURL('image/jpeg', 0.8);
        
        // UI Transition
        video.style.display = "none";
        inputArea.style.display = "none";
        canvas.style.display = "block";
        document.getElementById('resultArea').style.display = "block";
        
        // Success Message with Dynamic Threshold Count
        document.getElementById('successMsg').innerHTML = `Collect <b>${threshold}</b> different booth photos, then present this QR code at the service desk for an exclusive gift.`;
        
        // Generate QR Code
        document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(email)}`;
        document.getElementById('qrEmailText').innerText = `ID: ${email}`;

        // Async Upload to Google Sheet
        fetch(GAS_BACKEND_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'upload_photo',
                booth: boothId,
                name: name,
                email: email,
                photo: photoData
            })
        });
    });

    // 4. Web Share API Logic (Native share dialog)
    shareBtn.addEventListener('click', async () => {
        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
        try {
            const blob = await (await fetch(dataUrl)).blob();
            const file = new File([blob], 'POSRICH_Passport.jpg', { type: 'image/jpeg' });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({
                    files: [file],
                    title: 'POSRICH Expo Passport',
                    text: 'Here is my POSRICH Expo Digital Passport!'
                });
            } else {
                // Fallback: Trigger direct download if Web Share API is not supported
                const link = document.createElement('a');
                link.download = 'POSRICH_Passport.jpg';
                link.href = dataUrl;
                link.click();
            }
        } catch (error) {
            console.log('Sharing omitted or canceled by user.', error);
        }
    });
</script>

</body>
</html>
