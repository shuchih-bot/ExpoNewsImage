<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>跨攤位智慧展會 - 專屬頭條拍照</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #header { width: 100%; padding: 15px; background-color: #333; text-align: center; font-size: 1.2rem; font-weight: bold; box-sizing: border-box; }
        #camera-container { position: relative; width: 100%; max-width: 500px; aspect-ratio: 3/4; background-color: #000; overflow: hidden; margin-top: 20px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { display: none; }
        .btn { padding: 15px 30px; font-size: 1.2rem; background-color: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; width: 80%; max-width: 300px; font-weight: bold; }
        .btn:active { background-color: #0056b3; }
        #form-container, #result-container, #loading-container { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; }
        input { width: 100%; padding: 12px; margin: 10px 0; font-size: 1rem; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        #result-image { width: 100%; border: 3px solid white; border-radius: 8px; margin-bottom: 20px; }
        #qrcode-box { background: white; padding: 15px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; margin-top: 15px; width: 80%; }
        #qrcode-box p { color: #333; font-weight: bold; margin: 0 0 10px 0; font-size: 0.9rem; text-align: center; }
        .spinner { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="header">讀取攤位設定中...</div>

    <div id="loading-container" style="display: flex; margin-top: 50px;">
        <div class="spinner"></div>
        <div id="loading-text">連線至中央系統...</div>
    </div>

    <video id="video" autoplay playsinline></video>
    <div id="camera-container" style="display: none;">
        <button id="capture-btn" class="btn">📸 拍下專屬頭條</button>
    </div>
    <canvas id="canvas"></canvas>

    <div id="form-container">
        <h3>✨ 照片已生成，請輸入資料以解鎖</h3>
        <input type="text" id="user-name" placeholder="您的姓名或稱呼" required>
        <input type="email" id="user-email" placeholder="您的 Email (兌獎唯一憑證)" required>
        <button id="submit-btn" class="btn">🚀 送出並獲取護照</button>
    </div>

    <div id="result-container">
        <h3 style="color: #4CAF50;">🎉 成功！長按下方圖片即可儲存</h3>
        <img id="result-image" alt="您的專屬頭條">
        <div id="qrcode-box">
            <p>您的數位闖關護照<br><span id="display-email" style="color:#007bff;"></span></p>
            <div id="qrcode"></div>
            <p style="font-size: 0.75rem; color: #666; margin-top: 10px;">請至服務台出示此條碼核銷</p>
        </div>
    </div>

    <script>
        // 1. 核心參數設定
        const GAS_BACKEND_URL = "https://script.google.com/macros/s/AKfycbz027yKpTWY-HGKlRS1ScGd2zOH_efBUENCLsPGsA6PABsV_h73ArVMRWJQ_pG8kPI_/exec";
        
        // 抓取網址後面的 ?booth= 參數，若無則預設為 A
        const urlParams = new URLSearchParams(window.location.search);
        const BOOTH_ID = (urlParams.get('booth') || 'A').toUpperCase();
        
        let boothData = null;
        let bgImage = new Image();
        bgImage.crossOrigin = "Anonymous"; // 允許跨域繪製畫布

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const header = document.getElementById('header');
        
        // 2. 初始化：向 GAS 抓取攤位底圖設定
        window.onload = async () => {
            try {
                const response = await fetch(GAS_BACKEND_URL + "?action=get_settings");
                const data = await response.json();
                
                if (data.status === "success") {
                    // 在陣列中尋找符合網址參數的攤位代號
                    const booth = data.booths.find(b => b.id.toUpperCase() === BOOTH_ID);
                    if (booth) {
                        boothData = booth;
                        header.innerText = `📍 目前位置：${booth.name}`;
                        bgImage.src = booth.bgUrl;
                        
                        bgImage.onload = () => {
                            startCamera();
                        };
                        bgImage.onerror = () => {
                            alert("攤位底圖載入失敗，請確認試算表中填寫的 Postimages 網址是否正確。");
                        }
                    } else {
                        header.innerText = "❌ 找不到此攤位代號";
                        document.getElementById('loading-text').
