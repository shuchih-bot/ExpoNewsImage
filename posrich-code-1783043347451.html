<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSRICH 服務台核銷系統 / Redemption System</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #343a40; color: #fff; margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; background: #212529; padding: 20px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); }
        h2 { color: #f8f9fa; font-size: 20px; border-bottom: 1px solid #495057; padding-bottom: 15px; margin-top: 0; line-height: 1.4; }
        .section-title { font-size: 13px; color: #adb5bd; text-align: left; margin-top: 20px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #495057; border-radius: 6px; font-size: 16px; background: #495057; color: #fff; box-sizing: border-box; }
        input:focus { outline: none; border-color: #0d6efd; background: #e9ecef; color: #000; }
        
        #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 15px; display: none; background: #000; }
        #scanBtn { background-color: #6c757d; color: white; border: none; padding: 12px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 15px; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-main { background-color: #198754; color: white; border: none; padding: 15px 5px; font-size: 15px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; line-height: 1.3; }
        .btn-main:hover { background-color: #157347; }
        .btn-warning { background-color: #dc3545; color: white; border: none; padding: 15px 5px; font-size: 15px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; line-height: 1.3; }
        .btn-warning:hover { background-color: #bb2d3b; }
        button:disabled { background-color: #6c757d !important; cursor: not-allowed; opacity: 0.7; }
        
        #statusAlert { display: none; margin-top: 20px; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 15px; line-height: 1.6; text-align: left; white-space: pre-wrap; }
        .alert-success { background-color: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
        .alert-error { background-color: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
        .alert-warning { background-color: #fff3cd; color: #664d03; border: 1px solid #ffecb5; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛡️ POSRICH 核銷終端<br><span style="font-size: 16px; color: #adb5bd;">Redemption Terminal</span></h2>
    
    <div class="section-title">1. 值班身分 / Staff Auth</div>
    <input type="text" id="staffName" placeholder="輸入姓名 / Name (e.g. Alice)" required>
    <input type="password" inputmode="numeric" pattern="[0-9]*" id="dailyPin" placeholder="今日密碼 / Daily PIN (4 digits)" required>

    <div class="section-title">2. 數位護照 / Digital Passport</div>
    <button id="scanBtn">📷 開啟相機掃描 / Scan QR</button>
    <div id="reader"></div>
    <input type="email" id="customerEmail" placeholder="輸入客戶 Email / Enter Email" required>

    <div class="section-title">3. 執行核銷 / Action</div>
    <div class="btn-group">
        <button id="btnStandard" class="btn-main">✔️ 標準兌獎<br>Standard Redeem</button>
        <button id="btnOverride" class="btn-warning">🚨 手動特赦<br>Manual Override</button>
    </div>

    <div id="statusAlert"></div>
</div>

<script>
    const GAS_BACKEND_URL = "https://script.google.com/macros/s/AKfycbz027yKpTWY-HGKlRS1ScGd2zOH_efBUENCLsPGsA6PABsV_h73ArVMRWJQ_pG8kPI_/exec";
    
    const staffNameInput = document.getElementById('staffName');
    const dailyPinInput = document.getElementById('dailyPin');
    const customerEmailInput = document.getElementById('customerEmail');
    const btnStandard = document.getElementById('btnStandard');
    const btnOverride = document.getElementById('btnOverride');
    const statusAlert = document.getElementById('statusAlert');
    const scanBtn = document.getElementById('scanBtn');
    
    let html5QrcodeScanner;

    scanBtn.addEventListener('click', () => {
        document.getElementById('reader').style.display = "block";
        scanBtn.style.display = "none";
        html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    });

    function onScanSuccess(decodedText, decodedResult) {
        customerEmailInput.value = decodedText.toLowerCase();
        html5QrcodeScanner.clear();
        document.getElementById('reader').style.display = "none";
        scanBtn.style.display = "block";
        scanBtn.innerText = "重新開啟相機 / Restart Camera";
        showAlert("✅ 掃描成功！請確認 Email 並核銷。\nScan successful! Verify and redeem.", "success");
    }

    function onScanFailure(error) {}

    function submitRedeem(type) {
        const staff = staffNameInput.value.trim();
        const pin = dailyPinInput.value.trim();
        const email = customerEmailInput.value.trim().toLowerCase();

        if (!staff || !pin || !email) {
            showAlert("請完整填寫姓名、密碼與 Email！\nPlease fill in Staff Name, PIN, and Email!", "error");
            return;
        }
        if (pin.length !== 4) {
            showAlert("密碼必須為 4 位數字！\nPIN must be 4 digits!", "error");
            return;
        }

        setButtonsState(true);
        showAlert("⏳ 系統連線驗證中，請稍候...\nVerifying with server, please wait...", "warning");

        const requestPayload = {
            action: 'redeem',
            staffName: staff,
            pin: pin,
            customerEmail: email,
            type: type
        };

        fetch(GAS_BACKEND_URL, {
            method: 'POST',
            body: JSON.stringify(requestPayload)
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === "success") {
                showAlert(data.message, "success");
                customerEmailInput.value = ""; 
            } else if (data.status === "insufficient") {
                showAlert(data.message, "warning"); 
            } else {
                showAlert(data.message, "error"); 
            }
        })
        .catch(err => {
            showAlert("🚨 網路連線失敗，請檢查網路狀態！\nNetwork error, please check connection!", "error");
            console.error(err);
        })
        .finally(() => {
            setButtonsState(false);
        });
    }

    btnStandard.addEventListener('click', () => submitRedeem('standard'));
    btnOverride.addEventListener('click', () => submitRedeem('override'));

    function setButtonsState(isDisabled) {
        btnStandard.disabled = isDisabled;
        btnOverride.disabled = isDisabled;
        if(isDisabled) {
            btnStandard.innerHTML = "處理中...<br>Processing...";
            btnOverride.innerHTML = "處理中...<br>Processing...";
        } else {
            btnStandard.innerHTML = "✔️ 標準兌獎<br>Standard Redeem";
            btnOverride.innerHTML = "🚨 手動特赦<br>Manual Override";
        }
    }

    function showAlert(message, type) {
        statusAlert.style.display = "block";
        statusAlert.innerText = message;
        statusAlert.className = ""; 
        if (type === "success") statusAlert.classList.add("alert-success");
        if (type === "error") statusAlert.classList.add("alert-error");
        if (type === "warning") statusAlert.classList.add("alert-warning");
    }
</script>

</body>
</html>
